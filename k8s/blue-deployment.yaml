apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
  labels:
    app: sentiment-api
    slot: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentiment-api
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: blue
    spec:
      containers:
        - name: sentiment-api
          image: hassan911123/sentiment-api:unstable
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: logs-volume
              mountPath: /app/logs
      volumes:
        - name: logs-volume
          persistentVolumeClaim:
            claimName: sentiment-logs-pvc
