groups:
  - name: model_drift_alerts
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.58
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model confidence has dropped below threshold"
          description: "prediction_confidence_score has been below 0.58 for more than 1 minute. Triggering rollback to stable fallback."
